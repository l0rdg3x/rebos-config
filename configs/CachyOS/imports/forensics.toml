# Digital forensics / data-recovery toolkit.
# Most of these live in the AUR (a few are BlackArch-only).

[managers.system]
items = [
  "testdisk",        # official (also ships photorec)
  "sleuthkit",       # official
  "volatility3",     # official
  "safecopy",        # AUR
  "recoverjpeg",     # AUR
  "extundelete",     # AUR
  "dcfldd",          # AUR
  "afflib",          # AUR
  "yara-x",          # AUR (the Rust rewrite; official C one is `yara`)
  "scalpel-git",     # AUR (no stable `scalpel` package on Arch)
  "ext4magic-patch-extent-free",  # AUR - only ext4magic build available (extent patch);
                                  # was Gentoo sys-fs/ext4magic

  # --- Were already commented out in the Gentoo config -------------
  # "libewf",
  # "xmount",
]
