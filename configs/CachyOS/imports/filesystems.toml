# Filesystems, partitioning, RAID and Btrfs snapshot tooling.
#
# NOTE: on a CachyOS GRUB install, `grub-btrfs` + `btrfs-assistant` (and the
#       grub-btrfsd service) ship preinstalled and configured, so they are
#       intentionally not managed here.

[managers.system]
items = [
  "parted",
  "gparted",
  "xfsprogs",
  "e2fsprogs",
  "dosfstools",
  "btrfs-progs",
  "f2fs-tools",
  "ntfs-3g",
  "cifs-utils",
  "mdadm",
  "dmraid",
  "ddrescue",
  "snapper",
  "btrfsmaintenance",
]
