# Laptop power management.
#
# IMPORTANT: TLP and power-profiles-daemon (enabled in imports/desktop_kde.toml)
# are mutually exclusive. The package is installed here but the tlp.service is
# intentionally NOT enabled. Pick ONE:
#   - keep power-profiles-daemon (KDE integrates with it), OR
#   - enable TLP instead:  sudo systemctl mask power-profiles-daemon
#                          sudo systemctl enable --now tlp
# CachyOS users often prefer `auto-cpufreq` (AUR) - that conflicts with both too.

[managers.system]
items = [
  "tlp",
  "tlp-rdw",
]

