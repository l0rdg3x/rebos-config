# Productivity, communication, printing, remote access, cloud.

[managers.system]
items = [
  "cups",
  "hplip",
  "sane-airscan",
  "pcsc-tools",
  "rustconn",
  "proton-pass",                 # repo CachyOS (was app-admin/proton-pass-bin)
  "proton-vpn-gtk-app",          # official (pulls the proton-vpn python stack,
                                 # i.e. Gentoo's proton-vpn-network-manager)
  "discord",
  "code",                        # official OSS build of VS Code (was app-editors/vscode;
                                 # MS proprietary build is the AUR `visual-studio-code-bin`)
  "filezilla",
  "remmina",
  "nextcloud-client",
  "signal-desktop",
  "syncthing",
  "wireshark-qt",
  "ventoy-bin",                  # repo CachyOS (was sys-boot/ventoy-bin)
  "aws-cli",
  "vorta",                       # Arch - Borg backup GUI (was the Vorta Flatpak)
  "drawio-desktop",              # Arch (was the drawio Flatpak)
]

[managers.serv_now]
items = [
  "cups",
]

[managers.serv_user]
items = [
  "syncthing",   # per-user syncthing.service (was the syncthing OpenRC user service)
]

# Kept as Flatpak: native packages exist only in the AUR.
[managers.flatpak]
items = [
  "org.upscayl.Upscayl",
  "com.openterface.openterfaceQT",
]
