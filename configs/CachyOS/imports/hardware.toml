# Hardware: firmware updates, SMART, smartcards/FIDO, backlight, sysinfo.

[managers.system]
items = [
  "fwupd",
  "smartmontools",
  "libfido2",
  "opensc",
  "brightnessctl",   # official - backlight + LED/keyboard control (replaces the
                     # AUR `light` / Gentoo dev-libs/light). Ships udev rules so the
                     # `video` group can set brightness without root.
                     # CLI differs from light: `brightnessctl set 5%+` / `set 5%-`
  "gnome-firmware",  # Arch (was the org.gnome.Firmware Flatpak)
  "cpu-x",           # Arch (was the cpu-x Flatpak, previously in desktop_kde)
  "kdiskmark",       # Arch (was the kdiskmark Flatpak, previously in desktop_kde)
]
